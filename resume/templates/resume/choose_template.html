<!DOCTYPE html>
<html>
<head>
    <title>Choose Resume Template</title>

    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

/* 🌈 Background */
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
}

/* 🧊 Card */
.template-card {
    position: relative;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

.template-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* 🖼️ Preview Image */
.template-img {
    height: 250px;
    object-fit: cover;
    width: 100%;
    transition: 0.3s;
}

.template-card:hover .template-img {
    transform: scale(1.05);
}

/* 🎯 Overlay */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    opacity: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: 0.3s;
}

.template-card:hover .overlay {
    opacity: 1;
}

/* 🔘 Button */
.btn-main {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 10px;
}

.btn-main:hover {
    transform: scale(1.05);
}

/* 🏷️ Selected */
.selected {
    border: 2px solid #00c6ff;
    box-shadow: 0 0 20px rgba(0,198,255,0.6);
}

</style>
</head>

<body>

<div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-5">
        <h2 class="fw-bold">
            <i class="bi bi-layout-text-window"></i> Choose Your Resume Template
        </h2>
        <p class="opacity-75">Pick a design that fits your style</p>
    </div>

    <div class="row g-4">

        <!-- TEMPLATE 1 -->
        <div class="col-md-4">
            <div class="template-card" onclick="selectTemplate(this)">
                
                <img src="{% static 'images/classic.png' %}" class="template-img">

                <!-- Overlay -->
                <div class="overlay">
                    <button class="btn btn-light" onclick="openPreview(event, 'classic.png')">
                        <i class="bi bi-eye"></i>
                    </button>

                    <a href="{% url 'generate_pdf' 'classic' %}" 
                       class="btn btn-main text-white">
                       Select
                    </a>
                </div>

                <div class="text-center p-3">
                    <h5>Classic</h5>
                    <p class="opacity-75">ATS Friendly</p>
                </div>
            </div>
        </div>

        <!-- TEMPLATE 2 -->
        <div class="col-md-4">
            <div class="template-card" onclick="selectTemplate(this)">
                
                <img src="{% static 'images/modern.png' %}" class="template-img">

                <div class="overlay">
                    <button class="btn btn-light" onclick="openPreview(event, 'modern.png')">
                        <i class="bi bi-eye"></i>
                    </button>

                    <a href="{% url 'generate_pdf' 'modern' %}" 
                       class="btn btn-main text-white">
                       Select
                    </a>
                </div>

                <div class="text-center p-3">
                    <h5>Modern</h5>
                    <p class="opacity-75">Clean Layout</p>
                </div>
            </div>
        </div>

        <!-- TEMPLATE 3 -->
        <div class="col-md-4">
            <div class="template-card" onclick="selectTemplate(this)">
                
                <img src="{% static 'images/professional.png' %}" class="template-img">

                <div class="overlay">
                    <button class="btn btn-light" onclick="openPreview(event, 'professional.png')">
                        <i class="bi bi-eye"></i>
                    </button>

                    <a href="{% url 'generate_pdf' 'professional' %}" 
                       class="btn btn-main text-white">
                       Select
                    </a>
                </div>

                <div class="text-center p-3">
                    <h5>Professional</h5>
                    <p class="opacity-75">Corporate Style</p>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- 🔍 MODAL PREVIEW -->
<div class="modal fade" id="previewModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark">
      <div class="modal-body">
        <img id="previewImage" style="width:100%; border-radius:10px;">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

// Highlight selection
function selectTemplate(card){
    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
}

// Open preview modal (FIXED)
function openPreview(event, img){
    event.stopPropagation(); // prevent card click
    document.getElementById('previewImage').src = "{% static 'images/' %}" + img;

    var modal = new bootstrap.Modal(document.getElementById('previewModal'));
    modal.show();
}

</script>

</body>
</html>
