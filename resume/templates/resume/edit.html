<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Resume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

/* 🌈 Background */
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
    color: #272323;
}

.h3 {
color:#fff;
}

/* ✨ Glass Card */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    border: none;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    
}

/* Inputs */
.form-control, .form-select {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 10px;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.6);
}

.form-control:focus {
    box-shadow: 0 0 10px rgba(0,198,255,0.5);
}

/* Section Title */
.section-title {
    font-weight: 600;
    font-size: 18px;
    color: #ffffff;
    margin-bottom: 12px;
}


/* 🏷️ Labels */
label {
    color: #e2e8f0;
    font-weight: 500;
    margin-bottom: 5px;

}

/* 🔽 Dropdown  */
.form-select option {
    background: #1e293b;
    color: #ffffff;
}

/* Button */
.btn-main {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 12px;
    padding: 12px;
    transition: 0.3s;
}

.btn-main:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 20px rgba(0,114,255,0.5);
}

/* Skills Tags */
.tag {
    display: inline-block;
    background: rgba(0, 255, 17, 0.2);
    padding: 5px 10px;
    border-radius: 8px;
    margin: 3px;
    font-size: 12px;
}

/* Smooth show/hide */
#expDetails {
    transition: all 0.3s ease;
}

</style>
</head>

<body>

<div class="container py-5">
<div class="card">

<h3 class="text-center mb-4">
    <i class="bi bi-pencil-square text-white" ></i> <label> Edit Resume</label> 
</h3>

<form method="post">
{% csrf_token %}

<!-- BASIC INFO -->
<h5 class="section-title"><i class="bi bi-person"></i> Basic Info</h5>

<input class="form-control mb-3" name="name" placeholder="Full Name" value="{{ data.name }}">
<input class="form-control mb-3" name="job_title" placeholder="Job Title" value="{{ data.job_title }}">

<div class="row">
    <div class="col-md-6">
        <input class="form-control mb-3" name="email" placeholder="Email" value="{{ data.email }}">
    </div>
    <div class="col-md-6">
        <input class="form-control mb-3" name="phone" placeholder="Phone" value="{{ data.phone }}">
    </div>
</div>

<!-- EXPERIENCE -->
<h5 class="section-title"><i class="bi bi-briefcase"></i> Experience</h5>

<select name="experience_type" class="form-select mb-3" id="expType">
    <option value="">Select Experience</option>
    <option value="fresher" {% if data.experience_type == "fresher" %}selected{% endif %}>Fresher</option>
    <option value="experienced" {% if data.experience_type == "experienced" %}selected{% endif %}>Experienced</option>
</select>

<input class="form-control mb-3" name="experience_years" placeholder="Years" value="{{ data.experience_years }}">

<!-- EXPERIENCE DETAILS -->
<div id="expDetails">

<input class="form-control mb-2" name="exp_job_title" placeholder="Job Title" value="{{ data.exp_job_title }}">
<input class="form-control mb-2" name="exp_company" placeholder="Company" value="{{ data.exp_company }}">

<div class="row">
    <div class="col-md-6">
        <input class="form-control mb-2" name="exp_start" placeholder="Start Year" value="{{ data.exp_start }}">
    </div>
    <div class="col-md-6">
        <input class="form-control mb-2" name="exp_end" placeholder="End Year" value="{{ data.exp_end }}">
    </div>
</div>

<textarea class="form-control mb-3" name="exp_description" placeholder="Description">{{ data.exp_description }}</textarea>

</div>

<!-- SKILLS -->
<h5 class="section-title"><i class="bi bi-tools"></i> Skills</h5>

<textarea class="form-control mb-2" name="skills" id="skillsInput" placeholder="Skills (comma separated)">{{ data.skills }}</textarea>

<div id="skillsPreview"></div>

<!-- PROJECTS -->
<h5 class="section-title"><i class="bi bi-kanban"></i> Projects</h5>

<textarea class="form-control mb-3" name="projects" placeholder="Projects (one per line)">{{ data.projects }}</textarea>

<!-- EDUCATION -->
<h5 class="section-title"><i class="bi bi-mortarboard"></i> Education</h5>

<textarea class="form-control mb-3" name="education" placeholder="Education">{{ data.education }}</textarea>

<!-- SUBMIT -->
<button class="btn btn-main w-100 text-white mt-3">
    <i class="bi bi-lightning-charge"></i> Generate Resume
</button>

</form>

</div>
</div>

<script>

// Experience Toggle
const expType = document.getElementById("expType");
const expDetails = document.getElementById("expDetails");

function toggleExp(){
    if(expType.value === "experienced"){
        expDetails.style.display = "block";
    } else {
        expDetails.style.display = "none";
    }
}
expType.addEventListener("change", toggleExp);
window.onload = toggleExp;

// Skills Tags Preview
const skillsInput = document.getElementById("skillsInput");
const preview = document.getElementById("skillsPreview");

function updateTags() {
    preview.innerHTML = '';
    const skills = skillsInput.value.split(',');

    skills.forEach(skill => {
        if(skill.trim()){
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.innerText = skill.trim();
            preview.appendChild(tag);
        }
    });
}

skillsInput.addEventListener('input', updateTags);
window.onload = function(){
    toggleExp();
    updateTags();
};

</script>

</body>
</html>
